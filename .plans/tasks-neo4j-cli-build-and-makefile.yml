tasks:
  - id: task-001
    title: "Fix neo4j-cli aura subcommand Use field"
    description: |
      In `neo4j-cli/main.go`, capture the command returned by `aura.NewCmd(cfg)`,
      override its `Use` field to `"aura"`, then pass it to `cmd.AddCommand`. This
      makes the command path `neo4j-cli aura <subcommand>` instead of
      `neo4j-cli aura-cli <subcommand>`. `aura.NewCmd` itself must not be changed
      so the standalone `aura-cli` binary is unaffected.
    status: completed
    dependencies: []
    acceptance_criteria:
      - "`neo4j-cli aura instance list` executes without error"
      - "`neo4j-cli aura-cli` does not resolve as a valid subcommand"
      - "`aura-cli instance list` (standalone binary) continues to work unchanged"
      - "`aura.NewCmd` in `neo4j-cli/aura/aura.go` is not modified"
    completed_at: 2026-04-30T15:30:00Z

  - id: task-002
    title: "Add minimal golangci-lint config"
    description: |
      Create `.golangci.yml` at the repo root with a minimal linter set: `govet`,
      `errcheck`, `staticcheck`, `unused`, and `gofmt`. Set `max-issues-per-linter`
      and `max-same-issues` to 0 so all issues are reported. This config will be
      used by both the Makefile and CI.
    status: completed
    dependencies: []
    acceptance_criteria:
      - "`.golangci.yml` exists at the repo root"
      - "Running `golangci-lint run ./...` locally completes without a config error"
      - "Only the five specified linters are enabled"
      - "`max-issues-per-linter: 0` and `max-same-issues: 0` are set"
    completed_at: 2026-04-30T16:00:00Z

  - id: task-003
    title: "Fix all existing golangci-lint errors"
    description: |
      Run `golangci-lint run ./...` against the codebase and resolve every reported
      issue. Fixes must not introduce breaking changes to CLI behaviour or alter
      public API signatures. If `errcheck` flags intentionally ignored errors (e.g.
      `cmd.Execute()`), use `//nolint:errcheck` with a comment rather than silently
      swallowing them.
    status: completed
    dependencies:
      - task-002
    acceptance_criteria:
      - "`golangci-lint run ./...` exits with code 0 and zero reported issues"
      - "`go test ./...` still passes after all fixes"
      - "No breaking changes to CLI command signatures or output format"
      - "Any `//nolint` directives added are narrowly scoped with a justification comment"
    completed_at: 2026-04-30T16:30:00Z

  - id: task-004
    title: "Create Makefile with all required targets"
    description: |
      Create a `Makefile` at the repo root exposing the targets: `build`,
      `build-aura`, `build-neo4j`, `test`, `lint`, `fmt`, `license-check`,
      `run-aura`, `run-neo4j`, and `clean`. Use `go env GOPATH` for tool paths
      rather than hardcoded values. Mark all non-file targets as `.PHONY`. The
      `license-check` target may assume a Unix shell (matching existing behaviour);
      add a comment noting this. All other targets must work on macOS, Linux, and
      Windows.
    status: completed
    dependencies:
      - task-002
      - task-003
    acceptance_criteria:
      - "`make build` produces `bin/aura-cli` and `bin/neo4j-cli`"
      - "`make test` runs `go test ./...` and exits 0 on a clean codebase"
      - "`make lint` runs `golangci-lint run ./...` and exits 0"
      - "`make fmt` runs `go fmt ./...` without error"
      - "`make license-check` runs the addlicense check and exits 0"
      - "`make clean` removes the `bin/` directory"
      - "All non-file targets are declared `.PHONY`"
    completed_at: 2026-04-30T17:00:00Z

  - id: task-005
    title: "Update GoReleaser for dual-binary release with macOS signing"
    description: |
      Update `.goreleaser.yaml` to build and archive both `aura-cli` (from
      `./neo4j-cli/aura/cmd`) and `neo4j-cli` (from `./neo4j-cli`). Each binary
      should produce its own archive per platform. Both binaries must inject the
      version via `-ldflags "-X main.Version={{.Env.GORELEASER_CURRENT_TAG}}"`. Extend
      the `notarize.macos[].ids` list to include `neo4j-cli` so both binaries are
      code-signed and notarized on macOS.
    status: completed
    dependencies:
      - task-001
    acceptance_criteria:
      - "`GORELEASER_CURRENT_TAG=dev goreleaser release --snapshot --clean` completes without error"
      - "Snapshot produces separate archives for `aura-cli` and `neo4j-cli` for each platform/arch combination"
      - "Both binaries report the injected version when invoked with `--version`"
      - "`notarize.macos[].ids` includes both `aura-cli` and `neo4j-cli`"
      - "The commented-out neo4j-cli build block is removed (not just uncommented)"
    completed_at: 2026-04-30T17:30:00Z

